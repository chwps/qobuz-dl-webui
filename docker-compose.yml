# Qobuz-DL Sync Watch Mode
# Periodically sync Qobuz playlists to a local directory.
#
# Quick start:
#   1. Edit SYNC_PLAYLISTS below with your Qobuz playlist URLs
#   2. Create config: docker compose run --rm qobuz-dl-sync -r
#   3. Start sync:    docker compose up -d
#

services:
  qobuz-dl-sync:
    # Option 1: utiliser une image pre-construite (decommenter et adapter)
    image: qobuz-dl-ultimate:latest

    # Option 2: construire localement (decommenter pour rebuild depuis le code source)
    # build: .
    container_name: qobuz-dl-sync
    environment:
      # Interval in seconds between each sync run (default: 21600 = 6 hours)
      - SYNC_INTERVAL=21600

      # One or more Qobuz playlist URLs, separated by semicolons
      # Example: https://play.qobuz.com/playlist/12345;https://play.qobuz.com/playlist/67890
      - SYNC_PLAYLISTS=

      # Override the download directory (optional - uses config.ini 'directory' if not set)
      # - SYNC_DIR=/music

      # Skip interactive confirmation prompts (set to 'true' for unattended)
      - SYNC_YES=true

      # Playlist sync folder format (Yubal-inspired structure)
      # Default: {album_artist}/{year} - {album_title}
      # Example: David Bowie/1977 - Heroes
      # - SYNC_PLAYLIST_FOLDER_FORMAT={album_artist}/{year} - {album_title}

      # Playlist sync track format
      # Default: {track_number:02d} - {track_title}
      # Example: 01 - Hero
      # - SYNC_PLAYLIST_TRACK_FORMAT={track_number:02d} - {track_title}

    volumes:
      # Persist the config file (created on first run with 'qobuz-dl -r')
      # IMPORTANT: adapter ces chemins a ton pool TrueNAS
      # Exemple : /mnt/tank/qobuz/config:/root/.config/qobuz-dl
      - /music-qobuz/config:/root/.config/qobuz-dl

      # Votre bibliotheque musicale - le container ecrira dans /music
      # Exemple : /mnt/tank/qobuz/music:/music
      - /music-qobuz/music:/music

    restart: unless-stopped
    entrypoint: ["python", "-m", "qobuz_dl"]
    command: ["sync-watch"]
